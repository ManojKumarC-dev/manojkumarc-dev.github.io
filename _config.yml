# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Manoj Kumar C"
title_separator          : "-"
name                     : "Manoj Kumar C"
description              : "Android Developer Portfolio"
url                      : "https://manojkumarc-dev.github.io"
baseurl                  : ""
repository               : "manojkumarc-dev/manojkumarc-dev.github.io"

# Author Information
author:
  avatar           : "profile.png"
  name             : "Manoj Kumar C"
  bio              : "Android Developer | Kotlin | Jetpack Compose"
  location         : "India"
  email            : "your-email@example.com"

  # Developer platforms
  github           : "manojkumarc-dev"
  linkedin         : ""
  stackoverflow    : ""
  kaggle           : ""

  # Social media
  twitter          : ""
  instagram        : ""
  youtube          : ""

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :

atom_feed:
  hide                   : false

# SEO
google_site_verification :
bing_site_verification   :

# Social Sharing
social:
  type                   : Person
  name                   : "Manoj Kumar C"
  links: []

# Analytics
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .sass-cache
  - node_modules
  - README
  - LICENSE

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Collections
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Permalinks
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-sitemap
  - jemoji

# Plugin whitelist (for GitHub Pages)
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-sitemap
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
